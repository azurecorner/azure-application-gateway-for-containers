apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.route.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "datasynchro-app.labels" . | nindent 4 }}
spec:
  parentRefs:
  - name: {{ .Values.gateway.name }}
    namespace: {{ .Release.Namespace }}
    sectionName: https
  hostnames:
  - {{ .Values.route.hostname | quote }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: {{ .Values.route.app1PathPrefix }}
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    backendRefs:
    - name: {{ .Values.apps.app1.service.name }}
      port: {{ .Values.apps.app1.service.port }}
  - matches:
    - path:
        type: PathPrefix
        value: {{ .Values.route.app2PathPrefix }}
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    backendRefs:
    - name: {{ .Values.apps.app2.service.name }}
      port: {{ .Values.apps.app2.service.port }}
