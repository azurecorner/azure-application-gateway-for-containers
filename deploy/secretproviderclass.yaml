apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: datasynchro-app-kv
  namespace: datasynchro-app
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    clientID: "${AZURE_APP_IDENTITY_CLIENT_ID}"
    keyvaultName: "${AZURE_KEY_VAULT_NAME}"
    tenantId: "${AZURE_TENANT_ID}"
    objects: |
      array:
        - |
          objectName: app-secret
          objectType: secret
          objectVersion: ""
  secretObjects:
  - secretName: datasynchro-app-secrets
    type: Opaque
    data:
    - objectName: app-secret
      key: APP_SECRET
