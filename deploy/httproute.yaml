apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: datasynchro-app-route
  namespace: datasynchro-app
spec:
  parentRefs:
  - name: datasynchro-app-gw
    namespace: datasynchro-app
    sectionName: http
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: datasynchro-app
      port: 3000
