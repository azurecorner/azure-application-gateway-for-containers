apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-demo-app
  namespace: azure-resources
  labels:
    app: webapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      containers:
        - name: otel-demo-app
          image: datasynchroacr.azurecr.io/web-app:latest
          ports:
            - containerPort: 5000
          env:
            - name: ASPNETCORE_URLS
              value: http://+:5000
            - name: ASPNETCORE_ENVIRONMENT
              value: Kubernetes
            - name: APPLICATIONINSIGHTS_CONNECTION_STRING
              value : InstrumentationKey=a96b70e7-4342-4313-bc26-e34536b2ccc7;IngestionEndpoint=https://francecentral-1.in.applicationinsights.azure.com/;LiveEndpoint=https://francecentral.livediagnostics.monitor.azure.com/;ApplicationId=b96fe3c5-0dff-4e72-a73d-28e3f944afb1
