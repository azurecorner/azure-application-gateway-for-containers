apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gateway-01
  namespace: azure-resources #$HELM_NAMESPACE
  annotations:
    alb.networking.azure.io/alb-id: /subscriptions/023b2039-5c23-44b8-844e-c002f8ed431d/resourceGroups/RG-APPLICATION-GATEWAY-FOR-CONTAINER/providers/Microsoft.ServiceNetworking/trafficControllers/alb-test #$RESOURCE_ID
spec:
  gatewayClassName: azure-alb-external
  listeners:
  - name: http
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: Same
  addresses:
  - type: alb.networking.azure.io/alb-frontend
    value: test-frontend #$FRONTEND_NAME